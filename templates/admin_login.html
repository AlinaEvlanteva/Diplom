<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/admin_login.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/header_footer.css') }}">
    <title>Вход в админку - ИнТехЛайт</title>
</head>
<body>
    <header>
        <div class="header_inner">
            <div class="header_logo">
                <a href="{{ url_for('main.index') }}"><img src="{{ url_for('static', filename='img/small/icons.svg') }}" alt="Логотип ИнТехЛайт"/></a>
            </div>
            <div class="header_link_icons">
                <a href="{{ url_for('main.catalog') }}" class="link_catalog"><img src="{{ url_for('static', filename='img/small/cat.svg') }}"/>Каталог</a>
                <a href="{{ url_for('cart.cart_page') }}" class="link_cart"><img src="{{ url_for('static', filename='img/small/cart.svg') }}" alt="Корзина"/>Корзина</a>
                <button onclick="openFeedbackModal()" class="but_request"><img src="{{ url_for('static', filename='img/small/quest.svg') }}"/>Помощь</button>
            </div>
        </div>
    </header>

    <main>
        <section class="login_section">
            <form method="POST" action="{{ url_for('admin.admin_login') }}" class="login_form">
                <!-- Flash сообщения (будут показываться если есть) -->
                <div class="flash_messages">
                    {% with messages = get_flashed_messages(with_categories=true) %}
                    {% if messages %}
                    {% for category, message in messages %}
                    <div class="flash flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                    {% endif %}
                    {% endwith %}
                </div>
                <h1>Вход</h1>
                <div id="form_data">
                    <label>
                        Логин
                    </label>
                    <input type="text" id="username" placeholder="Введите логин" name="username" required/>
                </div>
                <div id="form_data2">
                    <label>
                        Пароль
                    </label>
                    <input type="password" id="password" placeholder="Введите пароль" name="password" required/>
                </div>
                <button type="submit" class="but_vhod">
                    Войти
                </button>
                <a href="{{ url_for('main.index') }}" class="back_link">
                    На главную
                </a>
            </form>
        </section>
    </main>
</body>
</html>
