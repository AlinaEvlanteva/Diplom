<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/kat_tovars.css') }}">
    <title>ИнТехЛайт - Каталог - Подшипники</title>
</head>
<body>
    <header>
        <div class="header_inner">
            <div class="header_logo">
                <a href="{{ url_for('main.index') }}"><img src="{{ url_for('static', filename='img/small/icons.png') }}" alt="Логотип ИнТехЛайт"/></a>
            </div>
            <nav class="header_nav">
                <ul class="header_nav_menu">
                    <li><a href="#">Доставка</a></li>
                    <li><a href="#">Реквизиты</a></li>
                    <li><a href="#">Контакты</a></li>
                    <li><a href="#">Сертификаты</a></li>
                </ul>
            </nav>
            <div class="header_link_icons">
                <a href="{{ url_for('main.catalog') }}" class="link_catalog"><img src="{{ url_for('static', filename='img/small/cat.svg') }}"/>Каталог</a>
                <a href="{{ url_for('cart.cart_page') }}" class="link_cart" id="cart-link">
                    <img src="{{ url_for('static', filename='img/small/cart.svg') }}" alt="Корзина"/>
                    <span id="cart-count" class="cart-badge cart-badge-animate">{{ total_cart_items }}</span>
                    Корзина
                </a>
            </div>
        </div>
    </header>

    <main>
        <section class="section_kategory">
            <div class="section_catalog_info">
                <h3 id="cat_info_nav">Главная / Каталог / {{ category.name }}</h3>
                <h3>{{ category.name }}</h3>
            </div>
            <div class="section_products_podship">
                {% for product in products %}
                <div class="post_poshipniki">
                    <a href="{{ url_for('main.product_detail', product_id=product.id) }}" class="product_link">
                        <div class="product_image">
                            <img src="{{ url_for('static', filename='img/small/' + product.image) }}" alt="Картинка товара"/>
                        </div>
                        <h3 class="post_name">{{ product.name }}</h3>
                        <p>{{ product.short_specs }}</p>
                        <h3>{{ product.price }} ₽ / {{ product.unit or 'шт' }}</h3>
                    </a>
                </div>
                {% endfor %}
            </div>

        </section>
    </main>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
