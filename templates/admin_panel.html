    <script>
        function showTab(tabName, el) {
            document.querySelectorAll('.tab_content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab_btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            el.classList.add('active');
        }
        function showAddForm(type) {
            document.querySelectorAll('.admin_card').forEach(f => f.classList.add('hidden'));
            document.getElementById(type + '_form').classList.remove('hidden');
        }
        function hideAddForm(type) {
            document.getElementById(type + '_form').classList.add('hidden');
        }
    </script>
